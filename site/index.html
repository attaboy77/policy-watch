<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정책모니터 — 회계기준·세법 개정 동향</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700;900&family=Noto+Sans+KR:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f3f4f2;
    --card: #ffffff;
    --ink: #1c231f;
    --ink-soft: #66706a;
    --rule: #d5dad6;
    --seal: #b6301f;        /* 세법 — 직인 주홍 */
    --pine: #2f5d50;        /* 회계기준 — 관인 청록 */
    --indigo: #3b4a6b;      /* 법령 — 남색 */
    --font-serif: "Noto Serif KR", serif;
    --font-sans: "Noto Sans KR", sans-serif;
    --font-mono: "IBM Plex Mono", monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--paper); color: var(--ink); font-family: var(--font-sans); line-height: 1.55; }
  a { color: inherit; text-decoration: none; }
  a:hover .headline, a:hover.item-link { text-decoration: underline; text-underline-offset: 3px; }
  a:focus-visible, button:focus-visible, input:focus-visible { outline: 2px solid var(--pine); outline-offset: 2px; }
  .wrap { max-width: 1080px; margin: 0 auto; padding: 32px 20px 80px; }

  /* ── 마스트헤드 ── */
  header { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; }
  .masthead h1 { font-family: var(--font-serif); font-weight: 900; font-size: clamp(28px, 5vw, 40px); letter-spacing: 0.16em; }
  .masthead .sub { margin-top: 4px; font-size: 13px; color: var(--ink-soft); letter-spacing: 0.06em; }
  .seal {
    flex-shrink: 0; width: 58px; height: 58px;
    border: 2.5px solid var(--seal); border-radius: 6px; color: var(--seal);
    font-family: var(--font-serif); font-weight: 900; font-size: 18px; line-height: 1.15;
    display: grid; place-items: center; text-align: center;
    transform: rotate(-4deg); opacity: 0.88; user-select: none;
  }
  .double-rule { margin-top: 16px; border-top: 3px solid var(--ink); border-bottom: 1px solid var(--ink); height: 6px; }
  .meta-line {
    display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px;
    padding: 9px 2px; font-family: var(--font-mono); font-size: 12px; color: var(--ink-soft);
    border-bottom: 1px solid var(--rule);
  }
  .search-bar { display: flex; justify-content: flex-end; margin: 16px 0 6px; }
  .search-bar input {
    border: 1px solid var(--rule); background: var(--card); padding: 8px 16px;
    border-radius: 999px; font-family: var(--font-sans); font-size: 13px; width: 240px; color: var(--ink);
  }
  .search-bar input::placeholder { color: #9aa39e; }

  /* ── 톱 헤드라인 ── */
  .hero {
    background: var(--card); border: 1px solid var(--rule); border-top: 4px solid var(--ink);
    padding: 26px 28px; margin-top: 14px;
  }
  .hero .kicker { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .hero .headline {
    font-family: var(--font-serif); font-weight: 700;
    font-size: clamp(19px, 3.2vw, 26px); line-height: 1.4;
  }
  .hero .byline { margin-top: 12px; font-family: var(--font-mono); font-size: 12px; color: var(--ink-soft); }

  /* ── 카테고리 섹션 그리드 ── */
  .sections { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 20px; }
  .section { background: var(--card); border: 1px solid var(--rule); display: flex; flex-direction: column; }
  .section-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 18px; border-bottom: 2px solid var(--c, var(--ink));
  }
  .section-head h2 { font-family: var(--font-serif); font-weight: 900; font-size: 17px; letter-spacing: 0.1em; color: var(--c, var(--ink)); }
  .section-head .cnt { font-family: var(--font-mono); font-size: 11px; color: var(--ink-soft); }
  .section[data-cat="세법"]      { --c: var(--seal); }
  .section[data-cat="회계기준"]  { --c: var(--pine); }
  .section[data-cat="법령"]      { --c: var(--indigo); }

  .lead-item { padding: 16px 18px 14px; border-bottom: 1px solid var(--rule); }
  .lead-item .headline { font-family: var(--font-serif); font-weight: 700; font-size: 15.5px; line-height: 1.45; }
  .lead-item .byline { margin-top: 8px; font-family: var(--font-mono); font-size: 11px; color: var(--ink-soft); }

  .section ul { list-style: none; }
  .section li { border-bottom: 1px solid var(--rule); }
  .section li:last-child { border-bottom: none; }
  .item-link { display: block; padding: 11px 18px; font-size: 13.5px; line-height: 1.5; }
  .item-link .d { font-family: var(--font-mono); font-size: 11px; color: var(--ink-soft); margin-right: 8px; }

  .tag {
    display: inline-block; font-size: 11px; font-weight: 700; letter-spacing: 0.05em;
    color: var(--c, var(--ink-soft)); border: 1px solid currentColor;
    padding: 1px 8px; border-radius: 3px;
  }
  .stamp-new {
    display: inline-block; margin-left: 7px; border: 1.5px solid var(--seal); color: var(--seal);
    font-family: var(--font-serif); font-weight: 900; font-size: 10.5px;
    padding: 0 4px; border-radius: 3px; transform: rotate(-6deg); vertical-align: 2px;
  }
  .empty { padding: 28px 18px; text-align: center; color: var(--ink-soft); font-size: 13px; }
  footer { margin-top: 32px; font-size: 12px; color: var(--ink-soft); }

  @media (max-width: 900px) { .sections { grid-template-columns: 1fr; } }
  @media (max-width: 620px) {
    .search-bar input { width: 100%; }
    .hero { padding: 20px; }
  }
  @media (prefers-reduced-motion: no-preference) {
    .hero, .section { animation: rise 0.4s ease both; }
    .section:nth-child(2) { animation-delay: 0.07s; }
    .section:nth-child(3) { animation-delay: 0.14s; }
    @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; } }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="masthead">
      <h1>정책모니터</h1>
      <p class="sub">회계기준 · 세법 · 법령 개정 동향 자동 수집</p>
    </div>
    <div class="seal" aria-hidden="true">政策<br>監視</div>
  </header>
  <div class="double-rule"></div>
  <div class="meta-line">
    <span id="updated">최종 수집 —</span>
    <span id="count">0건</span>
  </div>

  <div class="search-bar">
    <input type="search" id="q" placeholder="키워드 검색 (예: 법인세, K-IFRS)" aria-label="키워드 검색">
  </div>

  <a class="hero" id="hero" href="#" target="_blank" rel="noopener" style="display:none"></a>

  <main class="sections" id="sections"></main>

  <footer>
    각 항목은 원문 기관 사이트로 연결됩니다. 본 페이지는 제목·링크만 수집하며 원문 저작권은 각 기관에 있습니다.
  </footer>
</div>

<script src="data.js"></script>
<script>
(function () {
  const data = window.POLICY_DATA || { updated: "-", items: [] };
  const CATEGORIES = ["세법", "회계기준", "법령"];
  let query = "";

  document.getElementById("updated").textContent = "최종 수집 " + data.updated;
  document.getElementById("q").addEventListener("input", e => { query = e.target.value.trim(); render(); });

  const SEVEN_DAYS = 7 * 24 * 3600 * 1000;
  const isNew = d => (Date.now() - new Date(d).getTime()) < SEVEN_DAYS;
  const esc = s => s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  const newStamp = d => isNew(d) ? '<span class="stamp-new">新</span>' : '';

  function render() {
    const items = data.items.filter(i => !query || i.title.includes(query) || i.source.includes(query));
    document.getElementById("count").textContent = items.length + "건";

    // 톱 헤드라인 = 전체에서 가장 최신 항목
    const hero = document.getElementById("hero");
    const top = items[0];
    if (top && !query) {
      hero.style.display = "block";
      hero.href = top.url;
      hero.style.setProperty("--c",
        top.category === "세법" ? "var(--seal)" : top.category === "회계기준" ? "var(--pine)" : "var(--indigo)");
      hero.innerHTML =
        '<div class="kicker"><span class="tag">' + top.category + '</span>' + newStamp(top.date) + '</div>' +
        '<div class="headline">' + esc(top.title) + '</div>' +
        '<div class="byline">' + top.source + ' · ' + top.date + '</div>';
    } else {
      hero.style.display = "none";
    }

    // 카테고리별 섹션 (헤드라인으로 나간 항목은 제외)
    const rest = (top && !query) ? items.slice(1) : items;
    const sections = document.getElementById("sections");
    sections.innerHTML = "";

    CATEGORIES.forEach(cat => {
      const catItems = rest.filter(i => i.category === cat);
      const sec = document.createElement("section");
      sec.className = "section";
      sec.dataset.cat = cat;

      let html = '<div class="section-head"><h2>' + cat + '</h2><span class="cnt">' + catItems.length + '건</span></div>';

      if (!catItems.length) {
        html += '<div class="empty">이 분야의 최근 수집 항목이 아직 없습니다.</div>';
      } else {
        const [lead, ...more] = catItems;
        html += '<a class="lead-item" href="' + lead.url + '" target="_blank" rel="noopener">' +
                '<div class="headline">' + esc(lead.title) + newStamp(lead.date) + '</div>' +
                '<div class="byline">' + lead.source + ' · ' + lead.date + '</div></a>';
        if (more.length) {
          html += '<ul>' + more.slice(0, 6).map(i =>
            '<li><a class="item-link" href="' + i.url + '" target="_blank" rel="noopener">' +
            '<span class="d">' + i.date.slice(5) + '</span>' + esc(i.title) + newStamp(i.date) + '</a></li>'
          ).join('') + '</ul>';
        }
      }
      sec.innerHTML = html;
      sections.appendChild(sec);
    });
  }

  render();
})();
</script>
</body>
</html>
